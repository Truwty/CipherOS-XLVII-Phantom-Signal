# ╔══════════════════════════════════════════════════════════════╗
# ║       CipherOS XLVII — Hyprland Wayland Configuration       ║
# ╚══════════════════════════════════════════════════════════════╝

monitor=,preferred,auto,auto

exec-once = hyprpaper
exec-once = hypridle
exec-once = ags
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = systemctl --user start cipher-voice.service
exec-once = sleep 3 && systemctl --user start cipher-screen-reader.service

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = OLLAMA_HOST,127.0.0.1:11434
env = WAYLAND_DISPLAY,wayland-0

general {
    gaps_in   = 4
    gaps_out  = 8
    border_size = 2
    col.active_border   = rgba(00d4ffee) rgba(0080ffee) 45deg
    col.inactive_border = rgba(1a1a2eaa)
    layout    = dwindle
    allow_tearing = false
    resize_on_border = true
}

decoration {
    rounding = 10
    active_opacity   = 0.97
    inactive_opacity = 0.88
    fullscreen_opacity = 1.0
    drop_shadow      = true
    shadow_range     = 20
    shadow_render_power = 3
    col.shadow       = rgba(000000bb)

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        new_optimizations = true
        xray              = true
        noise             = 0.012
        contrast          = 1.1
        brightness        = 0.85
        vibrancy          = 0.18
    }
}

animations {
    enabled = true
    bezier = cipher-snap,  0.05, 0.9, 0.1, 1.05
    bezier = cipher-slide, 0.23, 1.0, 0.32, 1.0
    bezier = cipher-fade,  0.0,  0.0, 0.2, 1.0
    animation = windows,     1, 5, cipher-snap,  slide
    animation = windowsOut,  1, 4, cipher-fade,  slide
    animation = windowsMove, 1, 4, cipher-slide
    animation = border,      1, 8, cipher-slide
    animation = borderangle, 1, 30, cipher-slide, loop
    animation = fade,        1, 5, cipher-fade
    animation = workspaces,  1, 6, cipher-slide, slide
    animation = layers,      1, 4, cipher-fade,  slide
}

input {
    kb_layout  = us
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click   = true
        drag_lock      = true
    }
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true
}

gestures {
    workspace_swipe          = true
    workspace_swipe_fingers  = 3
    workspace_swipe_distance = 300
    workspace_swipe_create_new = true
}

misc {
    disable_hyprland_logo     = true
    disable_splash_rendering  = true
    force_default_wallpaper   = 0
    mouse_move_enables_dpms   = true
    key_press_enables_dpms    = true
    animate_manual_resizes    = true
    enable_swallow            = true
    swallow_regex             = ^(kitty)$
    vrr = 0
}

windowrulev2 = float, class:^(cipher-chat)$
windowrulev2 = size 820 620, class:^(cipher-chat)$
windowrulev2 = center, class:^(cipher-chat)$
windowrulev2 = float, class:^(cipher-memory)$
windowrulev2 = size 1100 750, class:^(cipher-memory)$
windowrulev2 = center, class:^(cipher-memory)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$

layerrule = blur,   notifications
layerrule = xray 1, notifications
layerrule = blur,   launcher

source = ~/.config/hypr/keybinds.conf
