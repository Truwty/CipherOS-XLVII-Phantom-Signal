$mod = SUPER

# CipherOS AI control bindings
bind = $mod, Space,       exec, cipher voice --push-to-talk
bind = $mod, A,           exec, kitty --class=cipher-chat -- cipher chat
bind = $mod SHIFT, A,     exec, kitty --class=cipher-memory -- cipher memory show
bind = $mod, Z,           exec, cipher screen-ask
bind = $mod SHIFT, Z,     exec, cipher screen-read
bind = $mod, slash,       exec, cipher quick-ask
bind = $mod CTRL, slash,  exec, cipher briefing --force
bind = $mod SHIFT, M,     exec, kitty --class=cipher-monitor -- cipher monitor

# Applications
bind = $mod, Return,   exec, kitty
bind = $mod, E,        exec, thunar
bind = $mod, B,        exec, chromium
bind = $mod, P,        exec, fuzzel
bind = $mod, V,        exec, kitty --class=yazi -- yazi

# Screenshot / Recording
bind = , Print,       exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%s).png
bind = SHIFT, Print,  exec, grim ~/Pictures/screenshot-full-$(date +%s).png
bind = $mod, Print,   exec, wf-recorder --audio -f ~/Videos/recording-$(date +%s).mp4
bind = $mod SHIFT, Print, exec, pkill -INT wf-recorder

# Clipboard
bind = $mod, C, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Window management
bind = $mod, Q,           killactive
bind = $mod SHIFT, Q,     exit
bind = $mod SHIFT, F,     fullscreen, 0
bind = $mod, G,           fullscreen, 1
bind = $mod SHIFT, Space, togglefloating
bind = $mod, R,           togglesplit
bind = $mod, S,           togglespecialworkspace, scratchpad
bind = $mod SHIFT, S,     movetoworkspace, special:scratchpad

# Focus
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize
binde = $mod CTRL, H, resizeactive, -40 0
binde = $mod CTRL, L, resizeactive,  40 0
binde = $mod CTRL, K, resizeactive,  0 -40
binde = $mod CTRL, J, resizeactive,  0  40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod, Tab,        workspace, previous
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Media
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,        exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioPrev,        exec, playerctl previous
bindl  = , XF86AudioNext,        exec, playerctl next
bindel = , XF86MonBrightnessUp,  exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown,exec, brightnessctl set 5%-

# Lock
bind = $mod SHIFT, L, exec, hyprlock
