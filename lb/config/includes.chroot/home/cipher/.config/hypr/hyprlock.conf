background {
    monitor =
    path    = /usr/local/share/cipher/assets/wallpaper-default.png
    blur_size   = 7
    blur_passes = 3
    brightness  = 0.5
}
input-field {
    monitor    =
    size       = 280, 48
    outline_thickness = 2
    dots_size  = 0.28
    dots_spacing = 0.18
    outer_color = rgba(00d4ff88)
    inner_color = rgba(08081688)
    font_color  = rgb(c8e8ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##7ab8d4">Enter Password</span>
    check_color  = rgba(00ff8888)
    fail_color   = rgba(ff448888)
    fail_text    = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position     = 0, -80
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color   = rgba(00d4ffee)
    font_size = 72
    font_family = JetBrains Mono Bold
    position = 0, 200
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d %Y")"
    color   = rgba(c8e8ffaa)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, 110
    halign = center
    valign = center
}
label {
    monitor =
    text = CIPHEROS XLVII — PHANTOM SIGNAL
    color   = rgba(00d4ff66)
    font_size = 11
    font_family = JetBrains Mono
    position = 0, -160
    halign = center
    valign = center
}
