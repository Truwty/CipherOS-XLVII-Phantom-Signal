[main]
font=JetBrains Mono:size=13
dpi-aware=yes
prompt=⬡ 
terminal=kitty
layer=overlay
exit-on-keyboard-focus-loss=yes
icon-theme=Papirus-Dark
icons-enabled=yes
fields=name,generic,comment,categories,filename,keywords
line-height=30
letter-spacing=0
horizontal-pad=16
vertical-pad=8
inner-pad=8
image-size-ratio=0.5
anchor=center
width=45
lines=12
tabs=8
placeholder=Search applications…
match-mode=fzf
no-fuzzy=false

[colors]
background=0d0d1ef2
text=c8e8ffff
match=00d4ffff
selection=00d4ff22
selection-text=ffffffff
selection-match=00d4ffff
border=00d4ff44
input=c8e8ffff

[border]
width=1
radius=10
