# CipherOS — Kitty Terminal Configuration
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        13.0

# CipherOS color palette
foreground   #c8e8ff
background   #08081699
selection_foreground #000000
selection_background #00d4ff

color0  #0a0a1a
color1  #ff4488
color2  #00ff88
color3  #ffaa00
color4  #0080ff
color5  #9966ff
color6  #00d4ff
color7  #c8e8ff
color8  #1a1a2e
color9  #ff6699
color10 #33ffaa
color11 #ffbb33
color12 #3399ff
color13 #aa88ff
color14 #33ddff
color15 #ddeeff

cursor                #00d4ff
cursor_text_color     #000000
cursor_shape          beam
cursor_blink_interval 0.5

window_padding_width   12
window_padding_height  8
background_opacity     0.88
dynamic_background_opacity yes

enable_audio_bell no
visual_bell_duration 0.1

tab_bar_style         powerline
tab_powerline_style   round
tab_bar_background    #08081688
active_tab_foreground #000000
active_tab_background #00d4ff
inactive_tab_foreground #7ab8d4
inactive_tab_background #1a1a2e

scrollback_lines 10000
scrollback_pager_history_size 100

confirm_os_window_close 0

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0
