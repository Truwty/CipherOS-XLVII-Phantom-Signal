[storage]
root        = "/home/cipher/.local/share/cipher/memory"
sqlite_db   = "cipher_memory.db"
chroma_dir  = "vector_store"
max_entries = 50000
encrypt_at_rest = false

[categories.identity]
retention = "permanent"
priority  = 10

[categories.projects]
retention = "180d"
priority  = 8

[categories.conversations]
retention = "90d"
priority  = 5

[categories.preferences]
retention = "365d"
priority  = 9

[categories.facts]
retention = "permanent"
priority  = 7

[retrieval]
top_k                = 20
similarity_threshold = 0.72
hybrid_search        = true
keyword_weight       = 0.3
