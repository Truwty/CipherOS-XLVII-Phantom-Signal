[polling]
interval = 10

[thresholds]
cpu_warning      = 85
cpu_critical     = 95
ram_warning      = 80
ram_critical     = 92
disk_warning     = 85
disk_critical    = 95
gpu_temp_warning  = 80
gpu_temp_critical = 90
cpu_temp_warning  = 75
cpu_temp_critical = 85

[alerts]
cooldown            = 300
visual_notification = true
hud_alerts          = true
log_alerts          = true
