[engines]
primary            = "duckduckgo"
fallback           = "bing_scrape"
gemini_enabled     = false
gemini_api_key_env = "GEMINI_API_KEY"

[modes.search]
engine        = "duckduckgo"
max_results   = 10
fetch_content = true

[modes.news]
engine        = "duckduckgo"
time_filter   = "d"
max_results   = 8
fetch_content = true
include_rss   = true

[modes.research]
max_results   = 15
fetch_content = true
summarize     = true

[modes.price]
max_results   = 12
fetch_content = false

[modes.compare]
max_results   = 10
fetch_content = true
format        = "comparison_table"

[content]
max_page_chars   = 5000
fetch_timeout    = 10
parallel_fetches = 5
panel_threshold  = 120
