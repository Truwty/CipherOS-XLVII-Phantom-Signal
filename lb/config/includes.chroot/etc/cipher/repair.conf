[watchdog]
monitored_services = [
    "cipher-ai-core","cipher-voice","cipher-screen-reader",
    "cipher-system-monitor","ollama","pipewire",
    "wireplumber","NetworkManager"
]
check_interval  = 30
restart_timeout = 60
max_restarts    = 5

[integrity]
enabled    = true
monitored_paths = [
    "/usr/local/lib/cipher",
    "/usr/local/bin/cipher",
    "/etc/cipher",
]
check_interval_minutes = 60
on_violation = "alert"

[self_diagnosis]
ai_log_analysis   = true
analysis_interval = 30
diagnosis_model   = "phi3:mini"
auto_fix          = true
