[stt]
engine              = "faster-whisper"
model               = "small"
device              = "auto"
compute_type        = "int8"
language            = "auto"
vad_sensitivity     = 0.6
silence_timeout     = 1.2
min_speech_duration = 0.3
sample_rate         = 16000
chunk_size          = 1024
beam_size           = 5

[tts]
engine           = "piper"
model            = "/usr/local/share/cipher/piper-models/en_US-hfc_female-medium.onnx"
speed            = 1.1
volume           = 0.85
output_device    = ""
stream_sentences = true

[wake_word]
enabled          = true
words            = ["cipher", "hey cipher", "assistant"]
sensitivity      = 0.7
activation_sound = "/usr/local/share/cipher/assets/sounds/ready.ogg"
listen_timeout   = 10.0

[language]
preference_file      = "/home/cipher/.local/share/cipher/identity/language"
auto_download_voices = true
supported_locales    = ["en_US","en_GB","fr_FR","de_DE","es_ES","it_IT","ja_JP","zh_CN"]
