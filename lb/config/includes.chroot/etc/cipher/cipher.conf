[system]
version = "XLVII"
codename = "Phantom Signal"
log_level = "INFO"
log_dir = "/home/cipher/.local/share/cipher/logs"
data_dir = "/home/cipher/.local/share/cipher"
config_dir = "/etc/cipher"
temp_dir = "/tmp/cipher"

[ai]
primary_model   = "llama3.1:8b"
fast_model      = "phi3:mini"
vision_model    = "moondream"
code_model      = "codellama:7b"
embed_model     = "nomic-embed-text"
ollama_endpoint = "http://127.0.0.1:11434"
context_window  = 8192
max_tokens      = 2048
temperature     = 0.7
stream          = true
api_fallback    = false

[agent]
max_planning_steps     = 25
step_timeout           = 30
allow_terminal         = true
allow_web              = true
allow_file_ops         = true
allow_app_control      = true
allow_input_simulation = true
confirm_destructive    = true
sandbox_terminal       = true

[interface]
hud_mode              = "overlay"
hud_position          = "top-right"
hud_opacity           = 0.92
show_thinking         = false
content_panel_threshold   = 120
content_panel_max_height  = 600
socket_path           = "/tmp/cipher_hud.sock"
